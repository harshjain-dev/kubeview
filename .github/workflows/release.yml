name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kubeview-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kubeview-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kubeview-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kubeview-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz kubeview
          cd ../../..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download sha256 files
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Formula/kubeview.rb
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_MACOS_ARM=$(awk '{print $1}' artifacts/kubeview-macos-aarch64.tar.gz.sha256)
          SHA_MACOS_X86=$(awk '{print $1}' artifacts/kubeview-macos-x86_64.tar.gz.sha256)
          SHA_LINUX_ARM=$(awk '{print $1}' artifacts/kubeview-linux-aarch64.tar.gz.sha256)
          SHA_LINUX_X86=$(awk '{print $1}' artifacts/kubeview-linux-x86_64.tar.gz.sha256)

          cat > Formula/kubeview.rb <<EOF
          class Kubeview < Formula
            desc "Terminal UI for Kubernetes — pods, logs, exec, port-forward, secrets and more"
            homepage "https://github.com/harshjain-dev/kubeview"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/harshjain-dev/kubeview/releases/download/v#{version}/kubeview-macos-aarch64.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
              on_intel do
                url "https://github.com/harshjain-dev/kubeview/releases/download/v#{version}/kubeview-macos-x86_64.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/harshjain-dev/kubeview/releases/download/v#{version}/kubeview-linux-aarch64.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/harshjain-dev/kubeview/releases/download/v#{version}/kubeview-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "kubeview"
            end

            test do
              assert_match "kubeview ${VERSION}", shell_output("#{bin}/kubeview --version")
            end
          end
          EOF

      - name: Commit and push updated formula
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubeview.rb
          git commit -m "formula: update to ${GITHUB_REF_NAME}"
          git push
